<ion-header class="ion-no-border">
  <ion-toolbar>
    <ion-title>
      <div class="brand-container">
        <img src="assets/icon/traiviu-logo.png" alt="T" class="brand-logo-t" />
        <span class="brand-text">raiviu</span>
      </div>
    </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <div class="main-container">

    <section class="catalog-section">
      <div class="section-header">
        <h2 class="section-title">Tendencias</h2>
      </div>

      <div *ngIf="loadingTrending" class="loading-state">Cargando...</div>

      <div class="slider-wrapper" *ngIf="!loadingTrending">
        <button class="scroll-btn left" (click)="scrollRow(trendingRow, 'left')">‹</button>

        <div class="horizontal-list" #trendingRow>
          <div class="catalog-card" *ngFor="let item of trendingItems" (click)="abrirDetalle(item)">
            <img [src]="item.posterUrl" [alt]="item.title" class="catalog-poster" />
            <div class="catalog-info">
              <span class="catalog-title">{{ item.title }}</span>
              <span class="catalog-meta">
                {{ item.year || '—' }} · {{ item.mediaType === 'tv' ? 'Serie' : 'Película' }}
              </span>
            </div>
          </div>
        </div>

        <button class="scroll-btn right" (click)="scrollRow(trendingRow, 'right')">›</button>
      </div>
    </section>

    <section class="catalog-section">
      <div class="section-header">
        <h2 class="section-title">Estrenos</h2>
      </div>

      <div *ngIf="loadingReleases" class="loading-state">Cargando...</div>

      <div class="slider-wrapper" *ngIf="!loadingReleases">
        <button class="scroll-btn left" (click)="scrollRow(releaseRow, 'left')">‹</button>

        <div class="horizontal-list" #releaseRow>
          <div class="catalog-card" *ngFor="let item of releaseItems" (click)="abrirDetalle(item)">
            <img [src]="item.posterUrl" [alt]="item.title" class="catalog-poster" />
            <div class="catalog-info">
              <span class="catalog-title">{{ item.title }}</span>
              <span class="catalog-meta">{{ item.year || '—' }}</span>
            </div>
          </div>
        </div>

        <button class="scroll-btn right" (click)="scrollRow(releaseRow, 'right')">›</button>
      </div>
    </section>

    <section class="catalog-section">
      <div class="section-header">
        <h2 class="section-title">Imperdibles</h2>
      </div>

      <div *ngIf="loadingMustWatch" class="loading-state">Cargando...</div>

      <div class="slider-wrapper" *ngIf="!loadingMustWatch">
        <button class="scroll-btn left" (click)="scrollRow(mustWatchRow, 'left')">‹</button>

        <div class="horizontal-list" #mustWatchRow>
          <div class="catalog-card" *ngFor="let item of mustWatchItems" (click)="abrirDetalle(item)">
            <img [src]="item.posterUrl" [alt]="item.title" class="catalog-poster" />
            <div class="catalog-info">
              <span class="catalog-title">{{ item.title }}</span>
              <span class="catalog-meta">{{ item.year || '—' }}</span>
            </div>
          </div>
        </div>

        <button class="scroll-btn right" (click)="scrollRow(mustWatchRow, 'right')">›</button>
      </div>
    </section>

  </div>
</ion-content>
