<ion-header class="ion-no-border">
  <ion-toolbar>
    <ion-title>
      <div class="brand-container">
        <img src="assets/icon/traiviu-logo.png" alt="T" class="brand-logo-t" />
        <span class="brand-text">raiviu</span>
      </div>
    </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <div class="main-container">

    <!-- Título principal de la pantalla -->
    <div class="page-header">
      <h1 class="page-title">Mis Listas</h1>
    </div>

    <!-- Botón Crear Nueva Lista -->
    <div class="create-list-container">
      <ion-button expand="block" class="create-btn" fill="solid" (click)="presentCreateListAlert()">
        + Crear nueva lista
      </ion-button>
    </div>

    <!-- Título de sección -->
    <h3 class="section-title">Listas recientes</h3>
    <hr>
    <div class="title-divider"></div>

    <!-- Estado de carga -->
    <div *ngIf="isLoading" class="ion-text-center loading-state">
      <ion-spinner name="crescent"></ion-spinner>
      <p>Cargando...</p>
    </div>

    <!-- Estado vacío -->
    <div *ngIf="!isLoading && lists.length === 0" class="empty-state">
      <p>Aún no tienes listas creadas.</p>
    </div>

    <!-- Lista de elementos -->
    <div class="lists-wrapper" *ngIf="!isLoading && lists.length > 0">

      <div class="custom-list-item" *ngFor="let list of lists">

        <div class="list-clickable-area" (click)="goToListDetails(list)">
          <div class="icon-container">
            <ion-icon src="assets/icon/folder-icon.svg" class="folder-icon"></ion-icon>
          </div>

          <div class="list-name-container">
            <span class="list-name">{{ list.name }}</span>
          </div>
        </div>

        <div class="options-container" [id]="'trigger-' + list.id" (click)="$event.stopPropagation()">
          <ion-icon src="assets/icon/more.svg"></ion-icon>
        </div>

        <ion-popover [trigger]="'trigger-' + list.id" triggerAction="click" alignment="end" side="bottom"
          dismissOnSelect="true" class="custom-popover">
          <ng-template>
            <ion-content class="popover-content-bg">
              <ion-list class="popover-list">

                <ion-item button (click)="goToListDetails(list)" lines="none">
                  <ion-icon name="folder-open-outline" slot="start" class="popover-icon"></ion-icon>
                  <ion-label>Ver contenido</ion-label>
                </ion-item>

                <ion-item button (click)="presentEditListAlert(list)" lines="none">
                  <ion-icon name="pencil-outline" slot="start" class="popover-icon"></ion-icon>
                  <ion-label>Renombrar</ion-label>
                </ion-item>

                <ion-item button (click)="deleteList(list)" lines="none" class="delete-item">
                  <ion-icon name="trash-outline" slot="start" class="popover-icon-danger"></ion-icon>
                  <ion-label color="danger">Eliminar</ion-label>
                </ion-item>

              </ion-list>
            </ion-content>
          </ng-template>
        </ion-popover>

      </div>
    </div>

  </div>
</ion-content>
